<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Business Audit — Find Your Revenue Leaks</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; background: #0C0C12; color: #F0EDE8; font-family: Georgia, 'Times New Roman', serif; }
    input { font-family: monospace; }
    input::placeholder { color: #4A4844; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .fade { animation: fadeUp .45s ease; }
    .screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.25rem; }
    .col { display: flex; flex-direction: column; width: 100%; }
    .badge { display: inline-block; padding: .3rem .9rem; background: #FF6B3520; border: 1px solid #FF6B3550; border-radius: 100px; font-size: .66rem; letter-spacing: .13em; color: #FF6B35; font-family: monospace; text-transform: uppercase; }
    .cta-btn { padding: .9rem 2.2rem; background: #FF6B35; color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: Georgia, serif; box-shadow: 0 8px 32px #FF6B3540; }
    .cta-btn:disabled { opacity: .35; cursor: not-allowed; }
    .input { padding: .85rem 1rem; background: #FFFFFF08; border: 1px solid #FFFFFF18; border-radius: 10px; color: #F0EDE8; font-family: monospace; font-size: .92rem; outline: none; width: 100%; }
    .card { padding: 1.1rem 1.15rem; background: #FFFFFF06; border: 1px solid #FFFFFF10; border-radius: 14px; display: flex; flex-direction: column; gap: 6px; }
    .opt-btn { display: flex; flex-direction: column; gap: 7px; padding: .9rem; background: #FFFFFF06; border: 1px solid #FFFFFF12; border-radius: 12px; cursor: pointer; text-align: left; color: #C0BCB6; font-family: Georgia, serif; transition: all .15s; width: 100%; }
    .opt-btn.sel { background: #FF6B3518; border: 1px solid #FF6B3570; color: #F0EDE8; }
    .spinner { width: 44px; height: 44px; border: 3px solid #FFFFFF10; border-top: 3px solid #FF6B35; border-radius: 50%; animation: spin 1s linear infinite; }
    .tag { padding: .3rem .75rem; background: #6366F115; border: 1px solid #6366F130; border-radius: 99px; font-size: .78rem; color: #A5B4FC; font-family: monospace; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const GHL_LINK = "https://www.gohighlevel.com?fp_ref=g5wma&fp_sid=quiz";
const WEBHOOK = "https://services.leadconnectorhq.com/hooks/ioye5na0Oa185ebNny93/webhook-trigger/16e2f387-d72e-4292-a46e-3774a74ab95d";

const QUESTIONS = [
  { id:"business_type", emoji:"🏢", question:"What type of business do you run?", options:[
    {v:"local_service",icon:"🔧",l:"Local service (salon, gym, contractor, clinic)"},
    {v:"coaching_consulting",icon:"🎓",l:"Coaching or consulting"},
    {v:"real_estate",icon:"🏠",l:"Real estate or mortgage"},
    {v:"ecommerce_retail",icon:"🛍️",l:"E-commerce or retail"},
    {v:"agency_marketing",icon:"📱",l:"Agency or marketing services"},
    {v:"other",icon:"💼",l:"Other / General small business"},
  ]},
  { id:"biggest_challenge", emoji:"🚧", question:"What's your #1 growth challenge right now?", options:[
    {v:"not_enough_leads",icon:"📉",l:"Not getting enough leads"},
    {v:"leads_falling_through",icon:"🕳️",l:"Leads come in but nothing converts"},
    {v:"no_time",icon:"⏰",l:"Too busy to follow up consistently"},
    {v:"hard_to_book",icon:"📅",l:"Hard to get people to book appointments"},
  ]},
  { id:"current_tools", emoji:"🛠️", question:"How are you currently managing leads and customers?", options:[
    {v:"spreadsheets",icon:"📊",l:"Spreadsheets or sticky notes"},
    {v:"email_only",icon:"📧",l:"Just email and my phone"},
    {v:"multiple_tools",icon:"🔀",l:"Multiple tools that don't talk to each other"},
    {v:"basic_crm",icon:"💾",l:"A basic CRM but it's not working well"},
  ]},
  { id:"monthly_leads", emoji:"📊", question:"How many new leads or inquiries do you get per month?", options:[
    {v:"under_20",icon:"🌱",l:"Under 20 — just getting started"},
    {v:"20_to_50",icon:"📈",l:"20–50 — steady but needs work"},
    {v:"50_to_150",icon:"🔥",l:"50–150 — growing fast"},
    {v:"150_plus",icon:"🚀",l:"150+ — volume is the problem"},
  ]},
  { id:"time_drain", emoji:"⏳", question:"What's stealing the most time from your week?", options:[
    {v:"chasing_leads",icon:"📞",l:"Manually calling and texting leads"},
    {v:"scheduling",icon:"🗓️",l:"Back-and-forth scheduling"},
    {v:"social_reviews",icon:"⭐",l:"Managing reviews and social media"},
    {v:"admin_invoicing",icon:"🧾",l:"Admin, invoicing, and paperwork"},
  ]},
];

const BIZ = {
  local_service:"Local Service Business", coaching_consulting:"Coaching Business",
  real_estate:"Real Estate Business", ecommerce_retail:"E-Commerce Store",
  agency_marketing:"Marketing Agency", other:"Small Business",
};

const LOSS = {
  under_20:{m:"$800–$1,500/mo",h:"5–8 hrs/week"},
  "20_to_50":{m:"$2,000–$3,500/mo",h:"8–14 hrs/week"},
  "50_to_150":{m:"$4,000–$7,000/mo",h:"14–20 hrs/week"},
  "150_plus":{m:"$7,000–$15,000/mo",h:"20–30 hrs/week"},
};

const CHALLENGES = {
  not_enough_leads:{
    leak:"You don't have an automated system generating leads around the clock — every new client depends entirely on you hustling manually.",
    leaks:[
      {t:"No Automated Lead Capture",d:"Without landing pages and lead forms running 24/7, you're missing inquiries from people who look you up after hours.",f:"GHL Landing Pages & Lead Capture Forms"},
      {t:"No Reputation Engine",d:"Businesses that automatically request reviews get 4x more Google reviews, driving free organic leads every single month.",f:"GHL Reputation Management"},
      {t:"No Referral Follow-Up System",d:"Your past happy clients are your warmest lead source, but without automation, referral opportunities go completely untapped.",f:"GHL Automated Referral Sequences"},
    ],
    wins:["Build a simple landing page with a free offer to capture leads this week","Set up an automated review request to your last 20 customers","Create a referral text that goes out automatically 7 days after a job is complete"],
    features:["Landing Pages","Lead Capture Forms","Reputation Management","Automated Campaigns"],
    roi:"Businesses that add automated lead generation typically see 8–15 new inbound leads per month within 60 days — at zero additional ad spend.",
    cta:"Start your free GoHighLevel trial and build your first lead capture system today.",
  },
  leads_falling_through:{
    leak:"Leads are coming in but your follow-up is too slow — 78% of customers buy from whoever responds first, and manual follow-up can't compete.",
    leaks:[
      {t:"Slow Lead Response Time",d:"If you're not responding to new leads within 5 minutes, your conversion rate drops by over 80% — manual follow-up makes this impossible.",f:"GHL Instant Auto-Response (SMS + Email)"},
      {t:"No Multi-Touch Nurture Sequence",d:"Most leads need 5–8 touchpoints before they buy, but without automation most businesses give up after 1–2 attempts and lose the sale.",f:"GHL Automated Nurture Sequences"},
      {t:"No Visual Pipeline",d:"Without a CRM pipeline, hot leads go cold with no system to track who needs attention today versus who's already closed.",f:"GHL CRM Pipeline Management"},
    ],
    wins:["Set up an instant SMS auto-reply for every new lead within the next 24 hours","Build a 5-step follow-up sequence for leads who go quiet after the first contact","Create a visual pipeline with 5 stages so nothing falls through the cracks"],
    features:["Instant Auto-Response","Nurture Sequences","CRM Pipeline","2-Way SMS Messaging"],
    roi:"Businesses that implement automated follow-up sequences typically convert 30–50% more of their existing leads within 30 days — without spending more on ads.",
    cta:"Start your free GoHighLevel trial and plug your follow-up leaks this week.",
  },
  no_time:{
    leak:"You are the bottleneck in your own business — every follow-up, reminder, and check-in depends on you finding time that simply doesn't exist.",
    leaks:[
      {t:"Manual Follow-Up Consuming Your Day",d:"Sending individual texts and emails to leads manually eats 2–4 hours daily that should be spent on revenue-generating work.",f:"GHL Workflow Automation"},
      {t:"No-Show Appointments Draining Revenue",d:"Without automated reminders, no-shows cost service businesses an average of $300–$900/month in lost revenue and wasted time.",f:"GHL Appointment Reminders"},
      {t:"Repetitive Admin Running on Your Time",d:"Tasks like sending invoices, collecting payments, and onboarding clients run manually when they should happen automatically.",f:"GHL Automations & Payment Collection"},
    ],
    wins:["Automate your appointment reminder sequence this week to cut no-shows immediately","Set up a workflow that handles new lead follow-up without you touching it","Create templated responses for your 5 most common client communications"],
    features:["Workflow Automation","Appointment Reminders","2-Way SMS","Payment Collection"],
    roi:"Business owners who automate follow-up and admin work reclaim 10–15 hours per week and see revenue grow 20–40% within the first 90 days.",
    cta:"Start your free GoHighLevel trial and get your first 10 hours back this week.",
  },
  hard_to_book:{
    leak:"Every booking requires back-and-forth messages — you're losing potential clients to competitors who let people book instantly online.",
    leaks:[
      {t:"No Online Booking System",d:"Without self-service booking, potential clients who find you after hours or on weekends simply move on to someone they can book immediately.",f:"GHL Calendar & Online Booking"},
      {t:"Back-and-Forth Scheduling Killing Conversions",d:"Every extra step between interest and booking loses 15–30% of potential clients — friction kills revenue.",f:"GHL Automated Booking Funnels"},
      {t:"No Pre-Appointment Nurture",d:"Leads who express interest but don't book immediately need automated follow-up to bring them back — without it, they're gone.",f:"GHL Booking Follow-Up Sequences"},
    ],
    wins:["Set up your GHL calendar so clients can self-book in under 60 seconds","Create an automated follow-up for anyone who visits your booking page but doesn't complete it","Add a booking link to your email signature, social profiles, and Google listing today"],
    features:["Online Booking Calendar","Automated Booking Funnels","Appointment Reminders","Lead Follow-Up Sequences"],
    roi:"Businesses that add online self-booking see a 40–60% increase in appointments within 30 days, with zero additional marketing spend.",
    cta:"Start your free GoHighLevel trial and let clients book themselves starting today.",
  },
};

const TOOL_CONTEXT = {
  spreadsheets:"Your current spreadsheet system means leads are manually tracked and inevitably fall through the cracks.",
  email_only:"Managing leads through just email and your phone means nothing is automated and response time suffers.",
  multiple_tools:"Juggling multiple disconnected tools creates data silos, duplicate work, and missed follow-ups.",
  basic_crm:"Your current CRM isn't doing the automation work — it's just a more organized spreadsheet.",
};

function generateAudit(a, bizName) {
  const biz = BIZ[a.business_type] || "Small Business";
  const loss = LOSS[a.monthly_leads] || LOSS["20_to_50"];
  const ch = CHALLENGES[a.biggest_challenge] || CHALLENGES["leads_falling_through"];
  const toolNote = TOOL_CONTEXT[a.current_tools] || "";

  return {
    headline: `Your ${biz} Is Losing Est. ${loss.m} to Manual Work`,
    summary: `Based on your answers, ${bizName || "your business"} is experiencing a common but costly gap: ${ch.leak.split("—")[0].toLowerCase().trim()}. ${toolNote}`,
    monthly_loss: loss.m,
    hours_lost: loss.h,
    top_leak: ch.leak,
    leaks: ch.leaks,
    quick_wins: ch.wins,
    ghl_features: ch.features,
    roi_estimate: ch.roi,
    cta_line: ch.cta,
  };
}

// ── APP ─────────────────────────────────────────────────────────────────────

function App() {
  const [screen, setScreen] = useState("landing");
  const [qIdx, setQIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [selected, setSelected] = useState(null);
  const [lead, setLead] = useState({name:"",email:"",business:""});
  const [leads, setLeads] = useState([]);
  const [gErr, setGErr] = useState("");
  const [plan, setPlan] = useState(null);
  const [loading, setLoading] = useState(false);

  function startQuiz() { setQIdx(0); setAnswers({}); setSelected(null); setScreen("quiz"); }

  function nextQ() {
    if (!selected) return;
    const a = {...answers, [QUESTIONS[qIdx].id]: selected};
    setAnswers(a); setSelected(null);
    qIdx < QUESTIONS.length-1 ? setQIdx(qIdx+1) : setScreen("gate");
  }

  function submitGate() {
    if (!lead.name.trim()) { setGErr("Please enter your first name."); return; }
    if (!lead.email.trim() || !lead.email.includes("@")) { setGErr("Please enter a valid email."); return; }
    if (!lead.business.trim()) { setGErr("Please enter your business name."); return; }
    setGErr("");
    const nl = {...lead, answers, timestamp: new Date().toISOString()};
    setLeads(p=>[...p,nl]);
    if (WEBHOOK) fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(nl)}).catch(()=>{});
    setLoading(true);
    setScreen("loading");
    setTimeout(() => {
      setPlan(generateAudit(answers, lead.business));
      setLoading(false);
      setScreen("result");
    }, 3000);
  }

  function retake() {
    setScreen("landing"); setPlan(null); setAnswers({}); setQIdx(0);
    setSelected(null); setLead({name:"",email:"",business:""}); setGErr("");
  }

  if (screen==="landing") return (
    <div className="screen">
      <div className="col fade" style={{maxWidth:540,alignItems:"center",textAlign:"center",gap:18}}>
        <div className="badge">Free Business Audit · 2 Minutes</div>
        <h1 style={{fontSize:"clamp(2rem,6vw,3.2rem)",fontWeight:400,lineHeight:1.12,letterSpacing:"-.02em"}}>
          Is Your Business<br/><span style={{color:"#FF6B35",fontStyle:"italic"}}>Leaking Revenue?</span>
        </h1>
        <p style={{fontSize:".97rem",color:"#A09C96",lineHeight:1.75,maxWidth:440}}>
          Answer 5 quick questions and get a free personalized audit showing exactly where your business is losing time and money — and how to fix it.
        </p>
        <div style={{display:"flex",gap:"2rem",justifyContent:"center",padding:"1rem 2rem",background:"#FFFFFF08",borderRadius:16,border:"1px solid #FFFFFF10",width:"100%"}}>
          {[["5","Questions"],["Free","Audit"],["Instant","Results"]].map(([n,l])=>(
            <div key={l} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:"1.3rem",fontWeight:500,color:"#FF6B35",fontFamily:"monospace"}}>{n}</span>
              <span style={{fontSize:".66rem",color:"#6B6864",letterSpacing:".1em",textTransform:"uppercase",fontFamily:"monospace"}}>{l}</span>
            </div>
          ))}
        </div>
        <div className="col" style={{gap:8,maxWidth:400,width:"100%"}}>
          {["Stop losing leads to slow follow-up","See exactly which tasks to automate first","Get a personalized automation roadmap"].map(p=>(
            <div key={p} style={{display:"flex",alignItems:"center",gap:10,fontSize:".88rem",color:"#C0BCB6"}}>
              <span style={{color:"#FF6B35"}}>✓</span>{p}
            </div>
          ))}
        </div>
        <button className="cta-btn" onClick={startQuiz}>Get My Free Audit →</button>
        <p style={{fontSize:".72rem",color:"#4A4844",fontFamily:"monospace"}}>No credit card. No commitment. 100% free.</p>
      </div>
    </div>
  );

  if (screen==="quiz") {
    const q = QUESTIONS[qIdx];
    return (
      <div className="screen">
        <div className="col fade" style={{maxWidth:560,gap:18}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{flex:1,height:3,background:"#FFFFFF10",borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",background:"#FF6B35",borderRadius:99,width:`${(qIdx/QUESTIONS.length)*100}%`,transition:"width .4s ease"}}/>
            </div>
            <span style={{fontSize:".72rem",color:"#6B6864",fontFamily:"monospace",whiteSpace:"nowrap"}}>{qIdx+1} / {QUESTIONS.length}</span>
          </div>
          <div style={{fontSize:"2.2rem"}}>{q.emoji}</div>
          <h2 style={{fontSize:"clamp(1.3rem,3.5vw,1.8rem)",fontWeight:400,lineHeight:1.25,letterSpacing:"-.02em"}}>{q.question}</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {q.options.map(o=>(
              <button key={o.v} className={`opt-btn${selected===o.v?" sel":""}`} onClick={()=>setSelected(o.v)}>
                <span style={{fontSize:"1.3rem"}}>{o.icon}</span>
                <span style={{fontSize:".82rem",lineHeight:1.3,fontFamily:"monospace"}}>{o.l}</span>
              </button>
            ))}
          </div>
          <button className="cta-btn" onClick={nextQ} disabled={!selected}>
            {qIdx===QUESTIONS.length-1?"Show My Audit →":"Next →"}
          </button>
        </div>
      </div>
    );
  }

  if (screen==="gate") return (
    <div className="screen">
      <div className="col fade" style={{maxWidth:420,alignItems:"center",textAlign:"center",gap:18}}>
        <div style={{fontSize:"2.8rem"}}>📋</div>
        <h2 style={{fontSize:"1.9rem",fontWeight:400,letterSpacing:"-.02em"}}>Your audit is ready.</h2>
        <p style={{fontSize:".93rem",color:"#A09C96",lineHeight:1.65}}>Where should we send your personalized Business Automation Report?</p>
        <div className="col" style={{gap:9,width:"100%"}}>
          <input className="input" type="text" placeholder="Your first name" value={lead.name} onChange={e=>setLead(l=>({...l,name:e.target.value}))}/>
          <input className="input" type="text" placeholder="Business name" value={lead.business} onChange={e=>setLead(l=>({...l,business:e.target.value}))}/>
          <input className="input" type="email" placeholder="Email address" value={lead.email} onChange={e=>setLead(l=>({...l,email:e.target.value}))}/>
          {gErr && <div style={{padding:".6rem .9rem",background:"#FF444415",border:"1px solid #FF444440",borderRadius:8,fontSize:".82rem",color:"#FF8888",fontFamily:"monospace"}}>{gErr}</div>}
          <button className="cta-btn" onClick={submitGate}>Unlock My Audit →</button>
        </div>
        <p style={{fontSize:".72rem",color:"#4A4844",fontFamily:"monospace"}}>No spam. Unsubscribe anytime.</p>
      </div>
    </div>
  );

  if (screen==="loading") return <LoadingScreen/>;

  if (screen==="result" && plan) return <ResultScreen plan={plan} leads={leads} onRetake={retake}/>;

  return null;
}

function LoadingScreen() {
  const steps = ["Analyzing your business profile…","Calculating revenue leaks…","Identifying automation opportunities…","Building your custom audit…"];
  const [step, setStep] = useState(0);
  useEffect(()=>{ const t=setInterval(()=>setStep(s=>Math.min(s+1,steps.length-1)),750); return()=>clearInterval(t); },[]);
  return (
    <div className="screen" style={{justifyContent:"center"}}>
      <div className="col fade" style={{alignItems:"center",textAlign:"center",gap:22,maxWidth:300}}>
        <div className="spinner"/>
        <h2 style={{fontSize:"1.3rem",fontWeight:400,letterSpacing:"-.02em"}}>Running Your Audit</h2>
        <div className="col" style={{gap:7,textAlign:"left"}}>
          {steps.map((st,i)=>(
            <div key={st} style={{fontSize:".82rem",color:i<=step?"#A09C96":"#2A2826",fontFamily:"monospace",transition:"color .4s"}}>
              <span style={{color:"#FF6B35",marginRight:7}}>{i<=step?"✓":"○"}</span>{st}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ResultScreen({plan,leads,onRetake}) {
  return (
    <div style={{minHeight:"100vh",padding:"2rem 1.25rem",display:"flex",justifyContent:"center"}}>
      <div className="col fade" style={{maxWidth:600,gap:16,paddingBottom:"3rem"}}>

        <div className="col" style={{alignItems:"center",textAlign:"center",gap:10,paddingTop:"1rem"}}>
          <div className="badge">📋 Your Business Audit Results</div>
          <h1 style={{fontSize:"clamp(1.5rem,4vw,2.3rem)",fontWeight:400,lineHeight:1.2,letterSpacing:"-.02em"}}>{plan.headline}</h1>
          <p style={{fontSize:".93rem",color:"#A09C96",lineHeight:1.65}}>{plan.summary}</p>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={{padding:"1.1rem",background:"#FF6B3512",border:"1px solid #FF6B3530",borderRadius:14,display:"flex",flexDirection:"column",gap:4,alignItems:"center",textAlign:"center"}}>
            <span style={{fontSize:".62rem",letterSpacing:".15em",textTransform:"uppercase",color:"#FF6B35",fontFamily:"monospace"}}>Monthly Loss</span>
            <span style={{fontSize:"1.8rem",fontWeight:500,color:"#FF6B35",fontFamily:"monospace"}}>{plan.monthly_loss}</span>
          </div>
          <div style={{padding:"1.1rem",background:"#FFFFFF06",border:"1px solid #FFFFFF10",borderRadius:14,display:"flex",flexDirection:"column",gap:4,alignItems:"center",textAlign:"center"}}>
            <span style={{fontSize:".62rem",letterSpacing:".15em",textTransform:"uppercase",color:"#6B6864",fontFamily:"monospace"}}>Hours Lost/Week</span>
            <span style={{fontSize:"1.8rem",fontWeight:500,color:"#F0EDE8",fontFamily:"monospace"}}>{plan.hours_lost}</span>
          </div>
        </div>

        <div style={{padding:"1rem 1.15rem",background:"#FF6B3510",border:"1px solid #FF6B3530",borderRadius:12}}>
          <span style={{fontSize:".62rem",letterSpacing:".15em",textTransform:"uppercase",color:"#FF6B35",fontFamily:"monospace"}}>🚨 Biggest Leak</span>
          <p style={{margin:".4rem 0 0",fontSize:"1rem",color:"#F0EDE8",lineHeight:1.5,fontStyle:"italic"}}>{plan.top_leak}</p>
        </div>

        <div style={{fontSize:".62rem",letterSpacing:".2em",textTransform:"uppercase",color:"#4A4844",fontFamily:"monospace",paddingTop:4}}>Where You're Losing Money</div>

        {plan.leaks.map((leak,i)=>(
          <div key={i} className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <span style={{fontSize:".95rem",fontWeight:500,color:"#F0EDE8"}}>{leak.t}</span>
              <span style={{fontSize:".68rem",padding:".2rem .6rem",background:"#FF6B3515",border:"1px solid #FF6B3530",borderRadius:99,color:"#FF6B35",fontFamily:"monospace",flexShrink:0}}>Leak #{i+1}</span>
            </div>
            <p style={{margin:0,fontSize:".84rem",color:"#A09C96",lineHeight:1.5}}>{leak.d}</p>
            <div style={{display:"flex",alignItems:"center",gap:7,fontSize:".78rem",color:"#10B981",fontFamily:"monospace"}}>
              <span>✓ Fix:</span><span>{leak.f}</span>
            </div>
          </div>
        ))}

        <div style={{padding:"1.1rem",background:"#10B98112",border:"1px solid #10B98130",borderRadius:14}}>
          <div style={{fontSize:".62rem",letterSpacing:".15em",textTransform:"uppercase",color:"#10B981",fontFamily:"monospace",marginBottom:10}}>⚡ Quick Wins — Implement This Week</div>
          {plan.quick_wins.map((w,i)=>(
            <div key={i} style={{display:"flex",gap:8,fontSize:".85rem",color:"#C0BCB6",lineHeight:1.45,marginBottom:7}}>
              <span style={{color:"#10B981",flexShrink:0}}>→</span>{w}
            </div>
          ))}
        </div>

        <div className="card">
          <div style={{fontSize:".62rem",letterSpacing:".15em",textTransform:"uppercase",color:"#6B6864",fontFamily:"monospace"}}>🛠️ GHL Features That Solve This</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {plan.ghl_features.map(f=><span key={f} className="tag">{f}</span>)}
          </div>
        </div>

        <div style={{padding:"1.1rem",background:"#F59E0B10",border:"1px solid #F59E0B30",borderRadius:14}}>
          <div style={{fontSize:".62rem",letterSpacing:".15em",textTransform:"uppercase",color:"#F59E0B",fontFamily:"monospace",marginBottom:6}}>💰 Your ROI Potential</div>
          <p style={{margin:0,fontSize:".93rem",color:"#F0EDE8",lineHeight:1.6}}>{plan.roi_estimate}</p>
        </div>

        <div style={{padding:"1.5rem",background:"linear-gradient(135deg,#FF6B3520,#FF6B3508)",border:"1px solid #FF6B3540",borderRadius:16,display:"flex",flexDirection:"column",gap:12,alignItems:"center",textAlign:"center"}}>
          <h3 style={{fontSize:"1.2rem",fontWeight:400,color:"#F0EDE8",lineHeight:1.3}}>{plan.cta_line}</h3>
          <p style={{fontSize:".85rem",color:"#A09C96"}}>14-day free trial · No credit card required · Cancel anytime</p>
          <a href={GHL_LINK} target="_blank" rel="noopener noreferrer"
            style={{padding:".9rem 2.2rem",background:"#FF6B35",color:"#fff",borderRadius:12,fontSize:"1rem",fontWeight:600,textDecoration:"none",display:"inline-block",boxShadow:"0 8px 32px #FF6B3540"}}>
            Start My Free 14-Day Trial →
          </a>
          <p style={{fontSize:".72rem",color:"#4A4844",fontFamily:"monospace"}}>Trusted by 60,000+ businesses worldwide</p>
        </div>

        <button onClick={onRetake} style={{padding:".7rem 1.5rem",background:"transparent",border:"1px solid #FFFFFF18",borderRadius:10,color:"#6B6864",fontFamily:"monospace",fontSize:".83rem",cursor:"pointer",alignSelf:"center"}}>
          ↩ Start Over
        </button>

        {leads.length>0&&(
          <div style={{padding:"1.1rem",background:"#10B98110",border:"1px solid #10B98128",borderRadius:14,display:"flex",flexDirection:"column",gap:9,marginTop:8}}>
            <div style={{fontSize:".65rem",letterSpacing:".12em",textTransform:"uppercase",color:"#10B981",fontFamily:"monospace",fontWeight:700}}>📋 Leads Captured ({leads.length})</div>
            {leads.map((l,i)=>(
              <div key={i} style={{display:"flex",gap:10,padding:".4rem 0",borderTop:"1px solid #FFFFFF08",flexWrap:"wrap"}}>
                <span style={{fontSize:".82rem",color:"#F0EDE8",fontFamily:"monospace",minWidth:80}}>{l.name}</span>
                <span style={{fontSize:".82rem",color:"#10B981",fontFamily:"monospace",flex:1}}>{l.email}</span>
                <span style={{fontSize:".72rem",color:"#4A4844",fontFamily:"monospace"}}>{l.business}</span>
              </div>
            ))}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
